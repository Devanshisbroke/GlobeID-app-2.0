name: globeid
description: "GlobeID — Travel + identity super-app (Flutter migration of the React/TypeScript app)."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.6.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Routing
  go_router: ^14.6.2

  # State management
  flutter_riverpod: ^2.6.1

  # HTTP / API
  dio: ^5.7.0

  # Persistence
  shared_preferences: ^2.3.3
  flutter_secure_storage: ^9.2.2

  # UI
  cupertino_icons: ^1.0.8
  flutter_animate: ^4.5.2
  cached_network_image: ^3.4.1
  fl_chart: ^0.69.2
  qr_flutter: ^4.1.0
  lottie: ^3.1.3

  # Camera / OCR / scanner
  mobile_scanner: ^6.0.2
  google_mlkit_text_recognition: ^0.14.0
  camera: ^0.11.0+2
  image_picker: ^1.1.2

  # Native bridges
  flutter_local_notifications: ^18.0.1
  local_auth: ^2.3.0
  share_plus: ^10.1.2
  connectivity_plus: ^6.1.0
  geolocator: ^13.0.2
  speech_to_text: ^7.0.0
  vibration: ^2.0.1
  app_links: ^6.3.2
  path_provider: ^2.1.5
  sensors_plus: ^6.1.1

  # Maps / 3D globe — REMOVED in OS 2.0.
  # The entire heavy globe pipeline (3D shaders, GlobeRenderer,
  # great-circle arcs, the 2D flutter_map fallback) was dismantled
  # in favour of a typographic Discover atlas. flutter_map and
  # latlong2 are no longer pulled in — keep this comment as a marker
  # so they don't quietly creep back in.

  # Forms
  flutter_form_builder: ^10.3.0+2
  form_builder_validators: ^11.1.2

  # i18n
  intl: ^0.20.2

  # Crypto + utilities
  crypto: ^3.0.6
  decimal: ^3.0.2
  collection: ^1.18.0
  uuid: ^4.5.1
  vector_math: ^2.1.4

  # PDF
  pdf: ^3.11.1
  printing: ^5.13.4

  # Toasts
  toastification: ^2.3.0

  # High refresh rate (Android) — Flutter defaults to 60Hz even on 120Hz
  # panels. This package opts the app into the highest available mode
  # for buttery-smooth scroll + transitions. iOS ProMotion is handled by
  # Flutter automatically as of 3.10+.
  flutter_displaymode: ^0.6.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
